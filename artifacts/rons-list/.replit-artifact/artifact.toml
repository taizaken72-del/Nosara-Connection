kind = "web"
previewPath = "/"
title = "Ron's List"
version = "1.0.0"
id = "artifacts/rons-list"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22703

[services.development]
run = "pnpm --filter @workspace/rons-list run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rons-list", "run", "build" ]
publicDir = "artifacts/rons-list/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22703"
BASE_PATH = "/"
